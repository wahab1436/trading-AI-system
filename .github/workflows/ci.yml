name: CI - Continuous Integration

on:
  push:
    branches: [main, develop, feature/*]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.10'
  POETRY_VERSION: '1.4.0'

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 mypy pylint
          pip install -r requirements.txt
      
      - name: Run Black (format check)
        run: black --check --diff .
      
      - name: Run isort (import sort check)
        run: isort --check-only --diff .
      
      - name: Run flake8 (style guide)
        run: flake8 . --count --max-complexity=10 --max-line-length=120 --statistics
      
      - name: Run mypy (type checking)
        run: mypy . --ignore-missing-imports --allow-untyped-decorators
      
      - name: Run pylint (code quality)
        run: pylint **/*.py --fail-under=8.0 || true

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist pytest-timeout
          pip install -r requirements.txt
      
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term \
            --numprocesses=auto \
            --timeout=300
        env:
          TESTING: true
          USE_SYNTHETIC_DATA: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run Bandit (security linter)
        run: |
          pip install bandit
          bandit -r . -f json -o bandit-report.json || true
      
      - name: Run Safety (dependency scan)
        run: |
          pip install safety
          safety check --json > safety-report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  data-validation:
    name: Data Validation
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup DVC
        uses: iterative/setup-dvc@v1
      
      - name: Pull DVC data
        run: dvc pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      - name: Validate data schema
        run: |
          python -c "
          import pandas as pd
          from pathlib import Path
          
          data_dir = Path('data/raw')
          for file in data_dir.glob('*.parquet'):
              df = pd.read_parquet(file)
              assert 'open' in df.columns
              assert 'high' in df.columns
              assert 'low' in df.columns
              assert 'close' in df.columns
              assert 'timestamp' in df.columns
              print(f'✓ {file.name}: {len(df)} rows')
          "
      
      - name: Check for data drift
        run: |
          python mlops/drift_monitor.py --check --threshold 0.2 || true

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, security, data-validation]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Build Docker image
        run: |
          docker build -t trading-ai-system:latest .
          docker tag trading-ai-system:latest trading-ai-system:${{ github.sha }}
      
      - name: Run container tests
        run: |
          docker run --rm trading-ai-system:latest python -c "import sys; print('Container test passed')"
      
      - name: Save Docker image
        run: |
          docker save trading-ai-system:latest | gzip > trading-ai-system.tar.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: trading-ai-system.tar.gz
          retention-days: 7

  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [build]
    if: always()
    
    steps:
      - name: Send Slack notification
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_USERNAME: GitHub Actions
          SLACK_ICON: https://github.com/github.png
          SLACK_TITLE: CI Pipeline Status
          SLACK_MESSAGE: |
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Status: ${{ job.status }}
            Run: ${{ github.run_id }}
          SLACK_COLOR: ${{ job.status == 'success' && 'good' || 'danger' }}
          SLACK_FOOTER: Trading AI System
