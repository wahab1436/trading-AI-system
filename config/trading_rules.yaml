# Labeling Configuration
labeling:
  lookahead_candles: 8
  atr_multiplier: 1.2
  atr_period: 14
  min_move_threshold: 0.0001  # Minimum price movement
  
# Multi-Timeframe Configuration
htf:
  h4_trend_lookback: 20  # candles
  h1_structure_lookback: 50
  
# Session Filters
sessions:
  asian:
    exclude_for_xauusd: true
    hours: [0, 1, 2, 3, 4, 5, 6, 7]  # UTC
  london:
    hours: [8, 9, 10, 11, 12, 13, 14, 15, 16]
  new_york:
    hours: [13, 14, 15, 16, 17, 18, 19, 20, 21]
  overlap:
    hours: [13, 14, 15, 16]
    
# News Filter
news:
  red_folder_events: ["NFP", "CPI", "FOMC", "GDP", "Unemployment"]
  exclusion_minutes: 30
  
# Confidence Filters
confidence:
  min_confidence: 0.65
  high_confidence_threshold: 0.80
  confidence_scaling: true
