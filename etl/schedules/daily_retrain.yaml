# Daily Retrain Schedule Configuration
# Triggers model retraining pipeline at 00:00 UTC every Sunday

schedule:
  name: "daily_retrain"
  description: "Daily model retraining pipeline - runs at 00:00 UTC daily"
  
  # Cron schedule: At 00:00 every day
  cron: "0 0 * * *"
  
  # Timezone
  timezone: "UTC"
  
  # Flow parameters
  parameters:
    retrain_days_back: 90  # Last 90 days of data for retraining
    min_trades_for_retrain: 50  # Minimum trades before triggering retrain
    force_retrain: false  # Only retrain if performance degraded
    
  # Retrain conditions
  conditions:
    # Auto-retrain if any of these conditions are met
    auto_retrain_triggers:
      - type: "performance_degradation"
        metric: "win_rate"
        threshold: 0.10  # 10% drop from champion
        lookback_days: 30
        
      - type: "performance_degradation"
        metric: "profit_factor"
        threshold: 0.30  # 30% drop
        lookback_days: 30
        
      - type: "concept_drift"
        metric: "psi"
        threshold: 0.20  # PSI > 0.2 triggers retrain
        lookback_days: 14
        
      - type: "volatility_regime_shift"
        metric: "atr_percentile"
        threshold: 0.90  # ATR outside 90th percentile
        lookback_days: 7
        
      - type: "time_based"
        interval_days: 7  # Retrain every 7 days regardless
        
  # Data configuration
  data:
    symbols:
      - "XAUUSD"
      - "EURUSD"
    timeframes:
      - "15m"
      - "1h"
      - "4h"
    years_back: 5
    validation_split: 0.15
    test_split: 0.15
    
  # Model configuration for retraining
  model:
    cnn:
      architecture: "efficientnet-b3"
      epochs: 30  # Fewer epochs for retraining
      learning_rate: 0.00005  # Lower LR for fine-tuning
      
    fusion:
      n_estimators: 300  # Fewer trees for faster retraining
      max_depth: 6
      learning_rate: 0.05
      
  # Champion selection criteria
  champion_selection:
    metrics:
      - name: "profit_factor"
        weight: 0.35
        min_value: 1.3
        
      - name: "sharpe_ratio"
        weight: 0.25
        min_value: 1.0
        
      - name: "win_rate"
        weight: 0.20
        min_value: 0.48
        
      - name: "max_drawdown"
        weight: 0.20
        max_value: 0.15
        
    # New model must beat champion by at least this much to be promoted
    promotion_threshold: 0.05  # 5% improvement required
    
  # Execution configuration
  execution:
    max_concurrent_flows: 1  # Only one retrain at a time
    timeout_seconds: 7200  # 2 hours max
    retry_attempts: 2
    retry_delay_seconds: 300
    
  # Notifications
  notifications:
    on_success:
      - type: "slack"
        channel: "#ml-retrain-success"
        message: "✅ Model retrain completed successfully"
        
    on_failure:
      - type: "slack"
        channel: "#ml-retrain-failures"
        message: "❌ Model retrain failed"
        
      - type: "email"
        recipients: ["alerts@trading-ai.com"]
        subject: "URGENT: Model Retrain Failed"
        
  # Resource requirements
  resources:
    cpu: 4
    memory: "16Gi"
    gpu: 1
    disk: "100Gi"
    
  # Environment variables
  env_vars:
    MLFLOW_TRACKING_URI: "http://mlflow:5000"
    DVC_REMOTE: "s3://trading-ai-data/"
    MODEL_REGISTRY_PATH: "/models/registry"
    
  # Logging
  logging:
    level: "INFO"
    output_path: "/var/log/trading-ai/retrain/"
    retention_days: 30
